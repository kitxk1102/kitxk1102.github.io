<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>학급 활동 도우미 프로그램</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background-color: #294a24;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .site-container {
      max-width: 90vw; 
      width: 100%;
      padding: 10px; 
      box-sizing: border-box;
      border: 20px solid #ab865c;
      border-radius: 10px;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .site-card {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .site {
      width: 300px;
      margin: 20px;
      padding: 20px;
      background-color: #fff;
      color: #000000;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .site h2 {
      font-size: 20px;
      margin-top: 0;
    }

    .site p {
      font-size: 14px;
      margin-bottom: 15px;
    }

    .site a {
      display: inline-block;
      padding: 10px 15px;
      text-decoration: none;
      border-radius: 5px;
      background-color: #ab865c;
      color: #fff;
      transition: background-color 0.3s ease;
    }

    .site a:hover {
      background-color: #906d49;
    }

    @media screen and (max-height: 600px) {
      .site {
        width: 100%;
      }
    }
  </style>
  
</head>

<body>
  <div class="site-container">
    <p style='font-size:16px;'>매천고등학교 강민주 김찬우 안준범 제작</p>
    <h1>학급 활동 도우미 프로그램</h1>

    <div class="site-card">
      <div class="site">
        <h2>자리 배치 프로그램</h2>
        <p>지정된 학생 수에 따라 랜덤으로 자리를 배정해주는 프로그램입니다. (번호 기준)</p>
        <a href="file:///C:/Users/user1/OneDrive/%EB%B0%94%ED%83%95%20%ED%99%94%EB%A9%B4/%ED%95%99%EA%B8%89%20%EB%8F%84%EC%9A%B0%EB%AF%B8%20%EC%BD%94%EB%93%9C/%EC%95%88%EC%A4%80%EB%B2%94.html">바로가기</a>
      </div>

      <div class="site">
        <h2>학급 번호 랜덤 뽑기</h2>
        <p>학생 중 한 명을 무작위로 추첨해주는 프로그램입니다. (한 번 추첨된 번호는 제외합니다. 학생 수 지정 가능)</p>
        <a href="file:///C:/Users/user1/OneDrive/%EB%B0%94%ED%83%95%20%ED%99%94%EB%A9%B4/%ED%95%99%EA%B8%89%20%EB%8F%84%EC%9A%B0%EB%AF%B8%20%EC%BD%94%EB%93%9C/%EA%B9%80%EC%B0%AC%EC%9A%B0.html">바로가기</a>
      </div>
    </div>
  </div>
</body>
</html>
